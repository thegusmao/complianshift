name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: complianshift-linux-amd64
            separator: ":"
          - os: macos-latest
            artifact: complianshift-darwin-amd64
            separator: ":"
          - os: windows-latest
            artifact: complianshift-windows-amd64.exe
            separator: ";"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        shell: bash
        run: |
          SEP="${{ matrix.separator }}"
          pyinstaller --onefile \
            --name "${{ matrix.artifact }}" \
            --add-data "mapping.yaml${SEP}." \
            main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/complianshift-linux-amd64/complianshift-linux-amd64
            artifacts/complianshift-darwin-amd64/complianshift-darwin-amd64
            artifacts/complianshift-windows-amd64.exe/complianshift-windows-amd64.exe
